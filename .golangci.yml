# golangci-lint configuration for ticat
# See: https://golangci-lint.run/usage/configuration/

version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - govet
    - errcheck
    - ineffassign
  disable:
    - staticcheck
    - unused

formatters:
  enable:
    - gofmt
    - goimports
